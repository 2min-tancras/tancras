<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/logo.png" type="image/x-icon">
    <title>Tancras</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo-link">
            <img src="assets/logo.png" alt="logo" class="logo">
            <h1>Tancras</h1>
        </a>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar usuários..." autocomplete="off">
            <div id="searchResults" class="search-results"></div>
        </div>
        <div class="header-placeholder"></div>
    </header>
    <main>
        <div class="criar-post">
            <textarea id="conteudoPost" placeholder="O que está acontecendo?"></textarea>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="file" id="imagemPost" accept="image/*" style="display: none;">
                <button type="button" id="btnEscolherImagem" class="btn-imagem">📷</button>
                <button type="button" id="postarBtn">Postar</button>
            </div>
            <div id="previewImagem" style="margin-top: 10px;"></div>
        </div>
        <div id="feed"></div>
    </main>

    <nav class="bottom-nav">
        <button id="homeBtn" class="nav-btn active"><img src="assets/silhueta-de-icone-de-casa.png" alt="icone home" style="height: 16px; width: 16px;"> Home</button>
        <button id="perfilNavBtn" class="nav-btn"><img src="assets/do-utilizador.png" alt="icone perfil" style="height: 16px; width: 16px;"> Perfil</button>
        <button id="configNavBtn" class="nav-btn"><img src="assets/engrenagem.png" alt="icone configurações" style="height: 16px; width: 16px;"> Config</button>
    </nav>

    <div class="modal" id="modalConfig">
        <div class="modal-content">
            <button type="button" class="fechar" id="fecharConfigBtn">X</button>
            <h2>Configurações</h2>
            <button id="sairConfigBtn" class="btn-sair">Sair da conta</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
