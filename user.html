<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Tancras</title>
    <link rel="icon" href="assets/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo-link">
            <img src="assets/logo.png" alt="logo" class="logo">
            <h1>Tancras</h1>
        </a>
        <div class="header-right">
            <button type="button" id="voltarBtn">Voltar</button>
        </div>
    </header>
    <main>
        <div id="perfilInfo" class="perfil-container"></div>
        <div id="perfilPosts" class="posts-container"></div>
    </main>

    <nav class="bottom-nav">
        <button id="homeBtn" class="nav-btn"><img src="assets/silhueta-de-icone-de-casa.png" alt="icone home" style="height: 16px; width: 16px;"> Home</button>
        <button id="perfilNavBtn" class="nav-btn"><img src="assets/do-utilizador.png" alt="icone perfil" style="height: 16px; width: 16px;"> Perfil</button>
        <button id="configNavBtn" class="nav-btn"><img src="assets/engrenagem.png" alt="icone configurações" style="height: 16px; width: 16px;"> Config</button>
    </nav>

    <div class="modal" id="modalConfig">
        <div class="modal-content">
            <button type="button" class="fechar" id="fecharConfigBtn">X</button>
            <h2>Configurações</h2>
            <button id="sairConfigBtn" class="btn-sair">Sair da conta</button>
        </div>
    </div>

    <div class="modal" id="modalEditarPerfil">
        <div class="modal-content">
            <button type="button" class="fechar" id="fecharEditarBtn">X</button>
            <h2>Editar Perfil</h2>
            <form id="editarPerfilForm">
                <label>Foto de perfil:</label>
                <input type="file" id="fotoPerfilInput" accept="image/*" style="display: none;">
                <label for="fotoPerfilInput" class="btn-upload-foto">📷 Escolher foto</label>
                <div id="previewFoto" style="margin:10px 0;"></div>
                <input type="text" id="editNome" placeholder="Nome" required>
                <textarea id="editBio" placeholder="Bio" rows="3"></textarea>
                <button type="submit">Salvar alterações</button>
            </form>
            <div id="editarResposta"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
